<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>همس سالم الحارثي | بورتفوليو GIS</title>
<style>
body{
    margin:0;
    font-family:'Arial', sans-serif;
    color:#0f172a;
    scroll-behavior: smooth;
    background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Geographic_information_system_icon.svg/1024px-Geographic_information_system_icon.svg.png') no-repeat center top;
    background-size: cover;
}

/* HEADER */
header{
    text-align:center;
    padding:60px 20px;
    background: rgba(163,191,250,0.8);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid #6366f1;
}
header h1{ font-size:42px; margin-bottom:10px; }
header p{ font-size:18px; color:#1e293b; }
header img{ width:150px; margin-top:20px; border-radius:10px; }
button{ margin-top:20px; padding:12px 25px; background:#6366f1; border:none; color:white; cursor:pointer; font-size:16px; border-radius:8px;}

/* SECTIONS */
section{ padding:50px 20px; max-width:1100px; margin:auto; background: rgba(255,255,255,0.85); border-radius:12px; margin-bottom:40px;}
h2{ margin-bottom:25px; border-bottom:3px solid #6366f1; display:inline-block; padding-bottom:5px;}

/* PROJECT GRID */
.project-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}
.project-grid img{
    width:100%;
    border-radius:12px;
    cursor:pointer;
    transition: transform 0.3s, box-shadow 0.3s;
}
.project-grid img:hover{
    transform: scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* POPUP */
.modal{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
    z-index:100;
}
.modal-content{
    background:white;
    padding:25px;
    border-radius:12px;
    max-width:700px;
    width:90%;
    position:relative;
    text-align:center;
    animation: fadeIn 0.4s ease forwards;
}
.modal-content img{
    width:100%;
    border-radius:10px;
    margin-bottom:15px;
}
.close-btn{
    position:absolute;
    top:10px; right:15px;
    font-size:24px;
    cursor:pointer;
    color:#334155;
}

@keyframes fadeIn{
    from{opacity:0; transform: translateY(-20px);}
    to{opacity:1; transform: translateY(0);}
}

/* SKILLS */
.skills-list{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}
.skills-list span{
    background:#6366f1;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    font-weight:bold;
}

/* CONTACT */
.contact-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}
.contact-list a{
    text-decoration:none;
    color:#0f172a;
    transition: color 0.3s;
}
.contact-list a:hover{ color:#6366f1; }
</style>
</head>
<body>

<header>
    <h1>همس سالم الحارثي</h1>
    <p>محللة نظم المعلومات الجغرافية | GIS Professional</p>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Geographic_information_system_icon.svg/512px-Geographic_information_system_icon.svg.png" alt="GIS Icon">
    <br>
    <button onclick="document.getElementById('projects').scrollIntoView()">مشاريعي</button>
</header>

<section id="projects">
    <h2>المشاريع</h2>
    <div class="project-grid">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Electrical_grid_map_sample.svg/512px-Electrical_grid_map_sample.svg.png" onclick="openModal('خطوط الشبكة الكهربائية للسعودية','https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Electrical_grid_map_sample.svg/512px-Electrical_grid_map_sample.svg.png','تحليل خطوط الشبكة الكهربائية وتوزيعها عبر المملكة لتحسين التخطيط وإدارة البنية التحتية.')" alt="خطوط الشبكة الكهربائية للسعودية">
        
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Map_projection_sample.svg/512px-Map_projection_sample.svg.png" onclick="openModal('خريطة المركز المتوسط وخريطة توزيع الاتجاه','https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Map_projection_sample.svg/512px-Map_projection_sample.svg.png','تحليل المركز المتوسط والاتجاهات لتوزيع الموارد أو الخدمات في منطقة محددة.')" alt="خريطة المركز المتوسط وخريطة توزيع الاتجاه">

        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Interactive_map_icon.svg/512px-Interactive_map_icon.svg.png" onclick="openModal('كود HTML لخريطة تفاعلية','https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Interactive_map_icon.svg/512px-Interactive_map_icon.svg.png','خريطة تفاعلية تضغطين على الدولة ليظهر اسمها باستخدام HTML وJS.')" alt="كود HTML لخريطة تفاعلية">

        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Jeddah_map_sample.svg/512px-Jeddah_map_sample.svg.png" onclick="openModal('توزيع الحاويات لمدينة جدة','https://upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Jeddah_map_sample.svg/512px-Jeddah_map_sample.svg.png','تحليل مواقع الحاويات لتسهيل جمع النفايات وتحسين الخدمات البيئية.')" alt="توزيع الحاويات لمدينة جدة">

        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Landfill_impact_map_sample.svg/512px-Landfill_impact_map_sample.svg.png" onclick="openModal('تأثير المرادم لمدينة جدة','https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Landfill_impact_map_sample.svg/512px-Landfill_impact_map_sample.svg.png','تقييم تأثير مواقع المرادم على المناطق السكنية والبيئة.')" alt="تأثير المرادم لمدينة جدة">

        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Hydrology_map_sample.svg/512px-Hydrology_map_sample.svg.png" onclick="openModal('خريطة التحليل الهيدرولوجي','https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Hydrology_map_sample.svg/512px-Hydrology_map_sample.svg.png','تحليل شبكة المياه والأنهار لتقدير مخاطر السيول وتصميم البنية التحتية.')" alt="خريطة التحليل الهيدرولوجي">

        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/IDW_spline_kriging_example.svg/512px-IDW_spline_kriging_example.svg.png" onclick="openModal('خريطة IDW و Spline و Kriging','https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/IDW_spline_kriging_example.svg/512px-IDW_spline_kriging_example.svg.png','تطبيق أساليب التنبؤ المكاني لتوزيع البيانات وتحليل الاتجاهات.')" alt="خريطة IDW و Spline و Kriging">

        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Incinerator_impact_map_sample.svg/512px-Incinerator_impact_map_sample.svg.png" onclick="openModal('تأثير المحارق لمدينة جدة','https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Incinerator_impact_map_sample.svg/512px-Incinerator_impact_map_sample.svg.png','تقييم تأثير مواقع المحارق على البيئة والصحة العامة في المدينة.')" alt="تأثير المحارق لمدينة جدة">
    </div>
</section>

<section id="skills">
    <h2>المهارات</h2>
    <div class="skills-list">
        <span>ArcGIS Pro</span>
        <span>QGIS</span>
        <span>تحليل مكاني GIS</span>
        <span>خرائط تفاعلية HTML/JS</span>
        <span>Spatial Analysis</span>
        <span>IDW / Spline / Kriging</span>
    </div>
</section>

<section id="contact">
    <h2>تواصل معي</h2>
    <div class="contact-list">
        <a href="mailto:hams@example.com">البريد الإلكتروني: hams@example.com</a>
        <a href="https://www.linkedin.com/in/hams-alharthy" target="_blank">LinkedIn: Hams Alharthy</a>
        <a href="https://github.com/hams-alharthy" target="_blank">GitHub: Hams Alharthy</a>
    </div>
</section>

<!-- POPUP MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="modal-title"></h3>
        <img id="modal-img" src="" alt="Project Image">
        <p id="modal-desc"></p>
    </div>
</div>

<script>
function openModal(title,img,desc){
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-img').src = img;
    document.getElementById('modal-desc').innerText = desc;
    document.getElementById('modal').style.display='flex';
}
function closeModal(){
    document.getElementById('modal').style.display='none';
}
// close modal on click outside content
window.onclick = function(e){
    if(e.target.id==='modal'){ closeModal(); }
}
</script>

</body>
</html>
