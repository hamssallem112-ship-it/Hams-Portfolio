<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بورتفوليو همس الحارثي | نظم المعلومات الجغرافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --الخلفية: #070a13;
            --البطاقة: #111827;
            --اللون-الرئيسي: #00f2fe;
            --النص: #f1f5f9;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            background: var(--الخلفية);
            color: var(--النص);
            overflow-x: hidden;
        }

        /* هيدر احترافي بالصورة المطلوبة */
        header {
            height: 70vh;
            background: linear-gradient(to bottom, rgba(7, 10, 19, 0.3), rgba(7, 10, 19, 0.9)), 
                        url('image_5.png') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 3px solid var(--اللون-الرئيسي);
        }

        header h1 { font-size: 3.5rem; margin: 0; text-shadow: 0 0 15px var(--اللون-الرئيسي); }
        header p { font-size: 1.5rem; color: var(--اللون-الرئيسي); margin-top: 10px; }

        /* حاوية المشاريع مع حركة ظهور */
        .container { padding: 50px 20px; max-width: 1200px; margin: auto; }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--البطاقة);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0, 242, 254, 0.1);
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--اللون-الرئيسي);
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.2);
        }

        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card h3 { padding: 15px; text-align: center; font-size: 1.1rem; }

        /* لوحة العرض (Dashboard) مع تأثيرات الحركة */
        .dashboard {
            display: none;
            max-width: 1000px;
            margin: 50px auto;
            padding: 30px;
            background: var(--البطاقة);
            border-radius: 20px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }

        .map-frame {
            width: 100%;
            border-radius: 12px;
            border: 2px solid var(--اللون-الرئيسي);
            margin: 20px 0;
            transition: 0.3s;
        }
        
        .map-frame:hover { transform: scale(1.01); box-shadow: 0 0 20px var(--اللون-الرئيسي); }

        .status-tag {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            margin: 5px;
            font-size: 0.9rem;
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid var(--اللون-الرئيسي);
        }

        button {
            padding: 10px 25px;
            background: var(--اللون-الرئيسي);
            color: var(--الخلفية);
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            padding: 40px;
            border-top: 2px solid var(--اللون-الرئيسي);
            background: #02040a;
        }

        footer a { color: var(--النص); text-decoration: none; display: block; margin: 10px; }
    </style>
</head>
<body>

<header>
    <h1>همس سالم الحارثي</h1>
    <p>أخصائية نظم معلومات جغرافية (GIS Specialist)</p>
</header>

<div class="container" id="main-view">
    <h2 style="text-align: center; color: var(--اللون-الرئيسي); margin-bottom: 40px;">معرض المشاريع التحليلية</h2>
    <div class="projects-grid">
        <div class="card" onclick="showProject('health')">
            <img src="https://images.unsplash.com/photo-1527613426441-4da17471b66d?auto=format&fit=crop&w=500" alt="الصحة">
            <h3>توزيع المراكز الصحية في جدة</h3>
        </div>
        <div class="card" onclick="showProject('hydro')">
            <img src="https://images.unsplash.com/photo-1444491741275-3747c53c99b4?auto=format&fit=crop&w=500" alt="الأودية">
            <h3>التحليل الهيدرولوجي والأودية</h3>
        </div>
        <div class="card" onclick="showProject('waste')">
            <img src="https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?auto=format&fit=crop&w=500" alt="النفايات">
            <h3>إدارة النفايات لمدينة جدة</h3>
        </div>
    </div>
</div>

<div class="dashboard" id="dashboard">
    <button onclick="goBack()">← العودة للمشاريع</button>
    <div id="project-content"></div>
</div>

<footer>
    <h2>تواصل معي</h2>
    <a href="mailto:hamssallem112@gmail.com">📧 hamssallem112@gmail.com</a>
    <a href="https://wa.me/966560739523" target="_blank">📱 0560739523 (واتساب مباشر)</a>
</footer>

<script>
    const projects = {
        health: {
            title: "تحليل توزيع المراكز الصحية في مدينة جدة",
            desc: "دراسة تحليلية لمقارنة توزيع المراكز الصحية بالكثافة السكانية لتحديد الفجوات الخدمية في الأحياء.",
            maps: ["health1.jpg", "health2.jpg", "health3.jpg"], // استبدليها بصورك الحقيقية
            analysis: `
                <p><b>النتائج الرئيسية:</b></p>
                <ul>
                    <li>تركز عالٍ في أحياء (الزهراء، الروابي).</li>
                    <li>فجوات خدمية ملحوظة في (العزيزية، أم السلم).</li>
                    <li>توصية بزيادة المراكز في (الفيصلية، المربع).</li>
                </ul>
                <div class="status-tag">🟢 تغطية ممتازة</div>
                <div class="status-tag">🟡 تغطية متوسطة</div>
                <div class="status-tag">🔴 فجوة خدمية</div>
            `,
            tools: "ArcGIS Pro - Kernel Density - Spatial Join - Network Analyst"
        },
        hydro: {
            title: "التحليل الهيدرولوجي واستخلاص الأودية",
            desc: "نمذجة الجريان السطحي واستخلاص شبكات التصريف المائي لمدينة جدة.",
            maps: ["hydro1.jpg"],
            analysis: "تحديد مسارات السيول الحرجة ودعم التخطيط الحضري لتفادي مخاطر الفيضانات.",
            tools: "Spatial Analyst - Hydrology Tools - DEM Processing"
        },
        waste: {
            title: "إدارة النفايات والتحليل المكاني للمرادم",
            desc: "تحليل المواقع الأمثل للمرادم والمحارق وتوزيع الحاويات بجدة.",
            maps: ["waste1.jpg"],
            analysis: "استخدام النمذجة متعددة المعايير (MCDA) لضمان الاستدامة البيئية.",
            tools: "Suitability Analysis - Multi-Criteria Decision Analysis"
        }
    };

    function showProject(id) {
        const p = projects[id];
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
        let mapImages = p.maps.map(m => `<img src="${m}" class="map-frame" onerror="this.src='https://via.placeholder.com/800x400/111827/00f2fe?text=خريطة+التحليل+المكاني'">`).join('');

        document.getElementById('project-content').innerHTML = `
            <h2 style="color:var(--اللون-الرئيسي)">${p.title}</h2>
            <p style="font-size:1.2rem; line-height:1.6;">${p.desc}</p>
            <div style="margin: 30px 0;">
                ${mapImages}
            </div>
            <h3 style="color:var(--اللون-الرئيسي); border-bottom:1px solid #333; padding-bottom:10px;">التحليل والنتائج:</h3>
            <div>${p.analysis}</div>
            <h3 style="color:var(--اللون-الرئيسي); margin-top:30px;">الأدوات المستخدمة:</h3>
            <p style="background:#070a13; padding:15px; border-radius:10px;">${p.tools}</p>
        `;
        window.scrollTo(0,0);
    }

    function goBack() {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
    }
</script>

</body>
</html>
