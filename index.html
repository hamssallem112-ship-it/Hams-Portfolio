<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>همس سالم الحارثي | GIS</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Tajawal', sans-serif;
    background: #05010a;
    color: #eee;
}

/* الهيدر */
header {
    height: 100vh;
    display: flex;
    align-items: center;
    padding: 60px;
    background: linear-gradient(rgba(5,1,10,0.8), rgba(5,1,10,0.95)),
    url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564'); /* صورة GIS */
    background-size: cover;
}

.highlight {
    color: #a855f7;
}

h1 {
    font-size: 50px;
}

.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: #a855f7;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* الأقسام */
section {
    padding: 70px 60px;
}

h2 {
    color: #a855f7;
}

/* المشاريع */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
}

.card {
    background: #0f0a1a;
    border-radius: 16px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.card-content {
    padding: 20px;
}

/* POPUP */
.popup {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    top: 0;
    left: 0;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: #0f0a1a;
    padding: 30px;
    border-radius: 15px;
    width: 80%;
    max-width: 600px;
}

.close {
    float: left;
    font-size: 25px;
    cursor: pointer;
}

/* فوتر */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}
</style>
</head>

<body>

<header>
    <div>
        <h1>همس <span class="highlight">سالم الحارثي</span></h1>
        <p>محللة نظم معلومات جغرافية متخصصة في التحليل المكاني والبيئي</p>
        <button class="btn" onclick="goProjects()">المشاريع</button>
    </div>
</header>

<section id="projects">
<h2>المشاريع</h2>

<div class="grid">

<!-- 1 -->
<div class="card" onclick="openPopup('خطوط الشبكة الكهربائية',
'تحليل توزيع الشبكة الكهربائية في السعودية لتحديد مناطق التغطية والضغط.\n\nالمنهجية: Spatial Analysis.\n\nالنتيجة: دعم التخطيط للطاقة.')">
<img src="https://images.unsplash.com/photo-1581091215367-59ab6b3b3d8a">
<div class="card-content"><h3>الشبكة الكهربائية</h3></div>
</div>

<!-- 2 -->
<div class="card" onclick="openPopup('المركز المتوسط والاتجاه',
'تحليل توزيع البيانات باستخدام Mean Center و Direction.\n\nيساعد على فهم نمط التوزيع.')">
<img src="https://images.unsplash.com/photo-1524661135-423995f22d0b">
<div class="card-content"><h3>المركز المتوسط</h3></div>
</div>

<!-- 3 -->
<div class="card" onclick="openPopup('خريطة تفاعلية HTML',
'خريطة تفاعلية تعرض اسم الدولة عند الضغط باستخدام JavaScript.\n\nيميز مهارات Web GIS.')">
<img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429">
<div class="card-content"><h3>خريطة تفاعلية</h3></div>
</div>

<!-- 4 -->
<div class="card" onclick="openPopup('توزيع الحاويات',
'تحليل توزيع الحاويات في جدة.\n\nالنتيجة: اقتراح مواقع جديدة.')">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
<div class="card-content"><h3>الحاويات</h3></div>
</div>

<!-- 5 -->
<div class="card" onclick="openPopup('تأثير المرادم',
'تحليل بيئي باستخدام Buffer.\n\nقياس التأثير على المناطق.')">
<img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa">
<div class="card-content"><h3>المرادم</h3></div>
</div>

<!-- 6 -->
<div class="card" onclick="openPopup('تحليل هيدرولوجي',
'تحليل تدفق المياه باستخدام DEM.\n\nتحديد مجاري السيول.')">
<img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05">
<div class="card-content"><h3>الهيدرولوجي</h3></div>
</div>

<!-- 7 -->
<div class="card" onclick="openPopup('Interpolation',
'مقارنة IDW و Kriging و Spline.\n\nتحليل الدقة.')">
<img src="https://images.
 unsplash.com/photo-1504384308090-c894fdcc538d">
<div class="card-content"><h3>IDW / Kriging</h3></div>
</div>

<!-- 8 -->
<div class="card" onclick="openPopup('تأثير المحارق',
'تحليل تأثير المحارق بيئياً.\n\nتحديد مناطق الخطر.')">
<img src="https://images.unsplash.com/photo-1509395176047-4a66953fd231">
<div class="card-content"><h3>المحارق</h3></div>
</div>

</div>
</section>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-content">
<span class="close" onclick="closePopup()">×</span>
<h2 id="title"></h2>
<p id="text"></p>
</div>
</div>

<footer>
© همس سالم الحارثي
</footer>

<script>
function goProjects() {
document.getElementById("projects").scrollIntoView({behavior:"smooth"});
}

function openPopup(t,txt){
document.getElementById("title").innerText=t;
document.getElementById("text").innerText=txt;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
