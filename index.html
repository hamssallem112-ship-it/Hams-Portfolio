<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - همس سالم الحارثي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background-color: #f4f6f8;
      color: #333;
    }
    header {
      background: url('https://upload.wikimedia.org/wikipedia/commons/7/7a/ArcGIS_logo.png') center/cover no-repeat;
      height: 350px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-shadow: 0 2px 5px rgba(0,0,0,0.6);
    }
    header h1 {
      margin: 0;
      font-size: 2.5rem;
    }
    header p {
      font-size: 1.2rem;
    }
    section {
      padding: 50px 20px;
      max-width: 1200px;
      margin: auto;
    }
    h2 {
      text-align: center;
      color: #1e3a5f;
      margin-bottom: 40px;
    }
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }
    .project-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    .project-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 25px rgba(0,0,0,0.2);
    }
    .project-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .project-card h3 {
      margin: 15px;
      font-size: 1.2rem;
      color: #1e3a5f;
    }
    .contact {
      text-align: center;
      background: #1e3a5f;
      color: white;
      padding: 40px 20px;
      border-radius: 12px;
      margin-top: 50px;
    }
    .contact a {
      color: #f4f6f8;
      text-decoration: none;
      font-weight: bold;
    }
    @media(max-width:600px){
      header h1 { font-size: 2rem; }
      header p { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>همس سالم الحارثي</h1>
    <p>متخصصة في نظم المعلومات الجغرافية (GIS)</p>
  </header>

  <section>
    <h2>مشاريعي</h2>
    <div class="projects" id="projects">
      <!-- مشاريعك راح تظهر هنا -->
      <div class="project-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/01/World_map_blank_without_borders.svg" alt="مشروع 1">
        <h3>مشروع الخرائط التفاعلية</h3>
      </div>
      <div class="project-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/ArcGIS_Pro_screenshot.png" alt="مشروع 2">
        <h3>تحليل توزيع الخدمات</h3>
      </div>
      <!-- ممكن تضيفي مشاريع أكثر بنفس الطريقة -->
    </div>
  </section>

  <section class="contact">
    <h2>تواصل معي</h2>
    <p>📧 البريد الإلكتروني: <a href="mailto:hams@example.com">hams@example.com</a></p>
    <p>🌐 تويتر: <a href="https://twitter.com/hams">@hams</a></p>
  </section>

</body>
</html>
