<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Portfolio GIS</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f5f5f5;
}

/* الشريط العلوي */
header{
    background:#0f172a;
    color:white;
    padding:15px;
    text-align:center;
}

/* المشاريع */
.projects{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:40px;
    flex-wrap:wrap;
}

.card{
    width:280px;
    background:white;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h3{
    padding:15px;
}

/* الداشبورد */
.dashboard{
    display:none;
    padding:30px;
}

.map{
    width:100%;
    margin:15px 0;
    border-radius:10px;
}

.section-title{
    margin-top:25px;
    color:#0f172a;
}

button{
    padding:10px 20px;
    margin-bottom:20px;
    background:#0f172a;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>

</head>

<body>

<header>
<h1>Portfolio GIS</h1>
<p>تحليل مكاني باستخدام نظم المعلومات الجغرافية</p>
</header>

<!-- المشاريع -->
<div class="projects" id="projects">

    <!-- مشروع الصحة -->
    <div class="card" onclick="openDashboard('health')">
        <img src="images/health1.jpg">
        <h3>توزيع المراكز الصحية</h3>
    </div>

</div>

<!-- الداشبورد -->
<div class="dashboard" id="dashboard">
    <button onclick="goBack()">رجوع</button>
    <div id="content"></div>
</div>

<script>

function openDashboard(type){
    document.getElementById("projects").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    let content = document.getElementById("content");

    if(type === "health"){
        content.innerHTML = `
        <h2 class="section-title">توزيع المراكز الصحية في جدة</h2>

        <p>
        تحليل كفاءة توزيع المراكز الصحية مقارنة بالكثافة السكانية لتحديد الفجوات في التغطية الصحية.
        </p>

        <h3 class="section-title">الخرائط</h3>

        <img src="images/health1.jpg" class="map">
        <img src="images/health2.jpg" class="map">
        <img src="images/health3.jpg" class="map">

        <h3 class="section-title">النتائج</h3>
        <p>
        - تركز المراكز في الأحياء عالية الكثافة مثل الزهراء والروابي<br>
        - فجوات في العزيزية وأم السلم<br>
        - حاجة لتعزيز الخدمات في الفيصلية والمربع
        </p>

        <h3 class="section-title">تحليل التغطية</h3>
        <p>
        🟢 جيدة<br>
        🟡 متوسطة<br>
        🔴 ضعيفة<br>
        🟠 فجوات كبيرة
        </p>

        <h3 class="section-title">الأدوات</h3>
        <p>
        ArcGIS Pro - Kernel Density - Spatial Analysis
        </p>
        `;
    }
}

function goBack(){
    document.getElementById("projects").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
}

</script>

</body>
</html>
