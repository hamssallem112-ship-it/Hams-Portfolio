<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Portfolio GIS</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:linear-gradient(to bottom,#f8fafc,#e2e8f0);
}

header{
    background:#0f172a;
    color:white;
    padding:30px;
    text-align:center;
}

header h1{
    margin:0;
}

header p{
    margin:5px;
    opacity:0.8;
}

/* تعريف */
.about{
    padding:30px;
    text-align:center;
}

.projects{
    display:flex;
    justify-content:center;
    gap:25px;
    padding:40px;
    flex-wrap:wrap;
}

.card{
    width:300px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    text-align:center;
    padding:15px;
}

.dashboard{
    display:none;
    padding:30px;
    max-width:900px;
    margin:auto;
}

.map{
    width:100%;
    margin:20px 0;
    border-radius:12px;
}

.section-title{
    margin-top:30px;
    color:#0f172a;
    border-bottom:2px solid #ddd;
}

button{
    padding:10px 20px;
    background:#0f172a;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>

</head>

<body>

<header>
<h1>اسمك هنا</h1>
<p>محللة نظم معلومات جغرافية (GIS)</p>
</header>

<section class="about">
<p>
أنا مهتمة بالتحليل المكاني واستخدام GIS لدعم اتخاذ القرار، وأعمل على مشاريع تحليل التوزيع المكاني مثل الخدمات الصحية والكثافة السكانية.
</p>
</section>

<div class="projects" id="projects">

<div class="card" onclick="openDashboard('health')">
<img src="health1.jpg">
<h3>توزيع المراكز الصحية</h3>
</div>

</div>

<div class="dashboard" id="dashboard">
<button onclick="goBack()">رجوع</button>
<div id="content"></div>
</div>

<script>

function openDashboard(type){
document.getElementById("projects").style.display="none";
document.getElementById("dashboard").style.display="block";

let content=document.getElementById("content");

if(type==="health"){
content.innerHTML=`

<h2 class="section-title">توزيع المراكز الصحية في جدة</h2>

<p>
تحليل توزيع المراكز الصحية مقارنة بالكثافة السكانية لتحديد الفجوات في التغطية الصحية.
</p>

<img src="health1.jpg" class="map">
<img src="health2.jpg" class="map">
<img src="health3.jpg" class="map">

<h3 class="section-title">النتائج</h3>

<p>
- تركز المراكز في الأحياء عالية الكثافة مثل الزهراء والروابي<br>
- وجود فجوات في العزيزية وأم السلم<br>
- الحاجة لتعزيز الخدمات في الفيصلية والمربع
</p>

<h3 class="section-title">تحليل التغطية</h3>

<p>
🟢 تغطية جيدة<br>
🟡 متوسطة<br>
🔴 ضعيفة<br>
🟠 فجوات كبيرة
</p>

<h3 class="section-title">الأدوات</h3>

<p>
ArcGIS Pro - Spatial Analysis - Kernel Density
</p>

`;
}
}

function goBack(){
document.getElementById("projects").style.display="flex";
document.getElementById("dashboard").style.display="none";
}

</script>

</body>
</html>
