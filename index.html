<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>همس سالم الحارثي | GIS</title>

<!-- خط احترافي -->
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Tajawal', sans-serif;
    background: #0b1120;
    color: #e2e8f0;
}

/* الهيدر */
header {
    height: 100vh;
    display: flex;
    align-items: center;
    padding: 60px;
    background: linear-gradient(rgba(11,17,32,0.8), rgba(11,17,32,0.95)),
    url('https://images.unsplash.com/photo-1548345680-f5475ea5df84'); /* صورة GIS */
    background-size: cover;
}

.header-content {
    max-width: 600px;
}

h1 {
    font-size: 50px;
}

.highlight {
    color: #38bdf8;
}

.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: #38bdf8;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* الأقسام */
section {
    padding: 70px 60px;
}

h2 {
    color: #38bdf8;
}

/* المشاريع */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
}

.card {
    background: #111827;
    border-radius: 16px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.card-content {
    padding: 20px;
}

.details {
    display: none;
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.85;
}

/* فوتر */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}
</style>
</head>

<body>

<header>
    <div class="header-content">
        <h1>همس <span class="highlight">سالم الحارثي</span></h1>
        <p>محللة نظم معلومات جغرافية (GIS) متخصصة في التحليل المكاني ودعم اتخاذ القرار.</p>
        <button class="btn" onclick="goProjects()">استعراض المشاريع</button>
    </div>
</header>

<section id="projects">
    <h2>المشاريع</h2>

    <div class="grid">

        <div class="card" onclick="toggle(this)">
            <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b">
            <div class="card-content">
                <h3>توزيع الحاويات في جدة</h3>
                <div class="details">تحليل مواقع الحاويات واقتراح تحسينات.</div>
            </div>
        </div>

        <div class="card" onclick="toggle(this)">
            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
            <div class="card-content">
                <h3>تأثير المرادم</h3>
                <div class="details">تحليل بيئي باستخدام Buffer.</div>
            </div>
        </div>

        <div class="card" onclick="toggle(this)">
            <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429">
            <div class="card-content">
                <h3>خريطة تفاعلية (HTML)</h3>
                <div class="details">عرض بيانات عند الضغط على الخريطة.</div>
            </div>
        </div>

    </div>
</section>

<footer>
    © همس سالم الحارثي
</footer>

<script>
function goProjects() {
    document.getElementById("projects").scrollIntoView({ behavior: "smooth" });
}

function toggle(card) {
    let d = card.querySelector(".details");
    d.style.display = d.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
